name: GitHub Metrics

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Base profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: BonifacioDeOliveira

          filename: github-metrics.svg
          template: classic
          config_timezone: America/Sao_Paulo

          base: header, activity, community, metadata

          # Conta também repositórios de organizações e como colaborador,
          # não só os que você é dono.
          repositories_affiliations: owner, collaborator, organization_member

          # As contribuições/commits em repositórios privados aparecem quando:
          #  1. O METRICS_TOKEN tem o escopo "repo"; e
          #  2. "Include private contributions on my profile" está ativado em
          #     https://github.com/settings/profile

          # Reconhece seus commits mesmo com nomes/emails diferentes.
          commits_authoring: BonifacioDeOliveira, Bonifácio de Oliveira, Bonifacio de Oliveira, bonifacio, bonifaciodeoliveira@outlook.com, bonifacio@users.noreply.github.com

          # Esconde "Pull requests reviewed" (2º campo) e "Pull requests opened"
          # (3º campo) da seção Activity, mantendo Commits e os demais.
          # Logo abaixo, tema "cozy dev" inspirado na estética do jogo Coffee Talk:
          # fundo mocha escuro, texto creme/latte, títulos âmbar (crema) e ícones
          # em verde-terminal como pitada dev.
          extras_css: |
            .largeable-inline-flex .row > section:first-of-type > div.field:nth-of-type(2),
            .largeable-inline-flex .row > section:first-of-type > div.field:nth-of-type(3) { display: none !important; }

            /* === Tema cozy dev (vibe Coffee Talk) === */
            svg {
              background-color: #29202a !important;
              background-image: linear-gradient(165deg, #2e2330 0%, #241b26 55%, #2a1f23 100%) !important;
              color: #d2bb9d !important;
            }
            h1, h2 { color: #e8ad62 !important; }            /* títulos âmbar / crema do café */
            h2 { color: #d89a64 !important; font-weight: 600 !important; }
            .field { color: #d2bb9d !important; }            /* texto creme / latte */
            .field svg { fill: #99b489 !important; }         /* ícones verde-terminal (pitada dev) */
            h1 svg, h2 svg { fill: currentColor !important; }/* ícone do título acompanha o âmbar */
            footer { color: #8a7058 !important; }
            .avatar { border: 2px solid #e8ad62 !important; box-shadow: 0 0 0 1px #29202a !important; }
            .calendar .day { outline-color: rgba(0,0,0,0.25) !important; }
            :root {
              --color-calendar-graph-day-bg: #3a2c2a !important;
              --color-calendar-graph-day-L1-bg: #6e4c36 !important;
              --color-calendar-graph-day-L2-bg: #a06a3f !important;
              --color-calendar-graph-day-L3-bg: #d0934e !important;
              --color-calendar-graph-day-L4-bg: #edc079 !important;
            }
            /* O calendário de contribuições usa cores inline (fill="#..."); CSS
               sobrescreve atributo de apresentação. Remapeia o verde do GitHub
               para um degradê de café (espresso -> crema). */
            [fill="#ebedf0"] { fill: #3a2c2a !important; }   /* dia vazio */
            [fill="#9be9a8"] { fill: #6e4c36 !important; }   /* nível 1 */
            [fill="#40c463"] { fill: #a06a3f !important; }   /* nível 2 */
            [fill="#30a14e"] { fill: #d0934e !important; }   /* nível 3 */
            [fill="#216e39"] { fill: #edc079 !important; }   /* nível 4 */