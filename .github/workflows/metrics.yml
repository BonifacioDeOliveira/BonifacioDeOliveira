name: GitHub Metrics

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Base profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: BonifacioDeOliveira

          filename: github-metrics.svg
          template: classic
          config_timezone: America/Sao_Paulo

          base: header, activity, community, metadata

      - name: Isometric commit calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: BonifacioDeOliveira

          filename: metrics.isocalendar.svg
          template: classic
          config_timezone: America/Sao_Paulo

          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Languages activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: BonifacioDeOliveira

          filename: metrics.languages.svg
          template: classic
          config_timezone: America/Sao_Paulo

          base: ""

          plugin_languages: yes
          plugin_languages_indepth: yes

          # "most-used" tenta refletir o histórico dos repos analisados.
          # "recently-used" só pega eventos recentes, limitado pela API.
          plugin_languages_sections: most-used, recently-used

          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_threshold: 0%

          # Máximo permitido para recently-used
          plugin_languages_recent_days: 365
          plugin_languages_recent_load: 1000

          # Inclui mais categorias de arquivos
          plugin_languages_categories: markup, programming, data, prose
          plugin_languages_recent_categories: markup, programming, data, prose

          # Dá mais tempo para análise profunda
          plugin_languages_analysis_timeout: 60
          plugin_languages_analysis_timeout_repositories: 15

          # Ajuda a reconhecer seus commits mesmo com nomes/emails diferentes
          commits_authoring: BonifacioDeOliveira, Bonifácio de Oliveira, Bonifacio de Oliveira, bonifacio, bonifacio@users.noreply.github.com