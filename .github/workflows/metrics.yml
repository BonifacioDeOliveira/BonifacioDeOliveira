name: GitHub Metrics

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Base profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: BonifacioDeOliveira

          filename: github-metrics.svg
          template: classic
          config_timezone: America/Sao_Paulo

          base: header, activity, community, metadata

          # Conta também repositórios de organizações e como colaborador,
          # não só os que você é dono.
          repositories_affiliations: owner, collaborator, organization_member

          # Inclui contribuições/commits em repositórios privados.
          # Requer que o METRICS_TOKEN tenha o escopo "repo" e que a opção
          # "Include private contributions on my profile" esteja ativada em
          # https://github.com/settings/profile
          repositories_skipped: ""
          plugin_activity: yes
          plugin_activity_visibility: all
          plugin_activity_limit: 5
          plugin_activity_days: 0

          # Reconhece seus commits mesmo com nomes/emails diferentes.
          commits_authoring: BonifacioDeOliveira, Bonifácio de Oliveira, Bonifacio de Oliveira, bonifacio, bonifaciodeoliveira@outlook.com, bonifacio@users.noreply.github.com